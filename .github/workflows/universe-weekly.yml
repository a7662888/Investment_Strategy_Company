name: Universe Weekly Refresh

# 每週自動從母池100重算「週選30」並 commit(觸發 Render 部署)。
# 週日 16:00 UTC ≈ 台灣週一 00:00,用上週五收盤資料,週一即生效。
on:
  schedule:
    - cron: "0 16 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: universe-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install --quiet pandas requests
      - name: Refresh universe (週更:讀母池100 → 週選30)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python run_universe_refresh.py weekly
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model_artifacts/active_universe.json
          if git diff --cached --quiet; then
            echo "週選無變化,略過。"
          else
            git commit -m "chore(universe): 自動週更 週選30 [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
