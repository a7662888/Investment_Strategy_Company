name: Universe Monthly Refresh

# 每月自動重算「母池100 + 週選30」並 commit(觸發 Render 部署)。
# 時區:cron 為 UTC。每月 1 日 16:00 UTC ≈ 台灣隔日 00:00。
on:
  schedule:
    - cron: "0 16 1 * *"
  workflow_dispatch: {}      # 也可在 GitHub Actions 頁手動觸發

permissions:
  contents: write

concurrency:
  group: universe-refresh    # 與週更共用,避免同時 push 衝突
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install --quiet pandas requests
      - name: Refresh universe (月更:母池100 + 週選30)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}   # 選填;沒有也能跑(匿名,較易被限流)
        run: python run_universe_refresh.py both
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model_artifacts/active_pool.json model_artifacts/active_universe.json
          if git diff --cached --quiet; then
            echo "名單無變化,略過。"
          else
            git commit -m "chore(universe): 自動月更 母池100+週選30 [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
