name: Daily Performance Archive

# 每交易日(週一~週五)台灣收盤後,計算三家 Agent 前一交易日選股的實現報酬,
# 累積寫入 model_artifacts/strategy_archive.json 並 commit(讓績效歷史持久留存,供累積驗證與 propose_update)。
# 台灣收盤 13:30(05:30 UTC);取 08:00 UTC(台灣 16:00)確保當日資料就緒。
on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-performance
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install --quiet pandas requests
      - name: Compute & append daily performance
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python run_daily_performance.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model_artifacts/strategy_archive.json
          if git diff --cached --quiet; then
            echo "績效無變化,略過。"
          else
            git commit -m "chore(perf): 累積三家每日績效 [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
