name: Weekly Strategy Scorecard

# 每週日台灣晚上,讀 strategy_archive.json 算三家風險調整後成效(Sharpe/MDD/累積/勝率),
# 產出 reports/strategy_scorecard.md 並 commit。定期比較投資策略成效用。
# 週日 12:00 UTC(台灣 20:00)。
on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: strategy-scorecard
  cancel-in-progress: false

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate scorecard
        run: python run_scorecard.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reports/strategy_scorecard.md
          if git diff --cached --quiet; then
            echo "計分無變化,略過。"
          else
            git commit -m "chore(scorecard): 週度三家策略成效計分 [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
