name: Web Smoke Check

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "requirements*.txt"
      - "company/**"
      - "web/**"
      - "tests/**"
      - ".github/workflows/web-smoke.yml"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax-and-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check frontend syntax
        run: node --check web/app.js
      - name: Install strategy test dependencies
        run: pip install --quiet -r requirements-strategy.txt
      - name: Run app integration tests
        run: |
          python tests/test_app_integration.py
          python tests/test_no_lookahead.py
          python tests/test_decision_ledger.py
          python -m unittest discover -s tests -p 'test_*.py' -v

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: syntax-and-integration
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render after tests pass
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          test -n "$RENDER_DEPLOY_HOOK_URL"
          curl --fail --silent --show-error "$RENDER_DEPLOY_HOOK_URL"
