name: Web Smoke Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax-and-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check frontend syntax
        run: node --check web/app.js
      - name: Run app integration tests
        run: |
          python tests/test_app_integration.py
          python tests/test_no_lookahead.py
